name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # The windows-latest runner ships the .NET Framework 4.8 Developer
      # Pack in its default toolchain, which is what RpfSealer.csproj targets.
      - name: Build (Release)
        working-directory: src/RpfSealer
        run: dotnet build -c Release --nologo -v minimal

      - name: Run self-test (offline magic-unwrap verification)
        working-directory: src/RpfSealer/bin/Release
        shell: pwsh
        run: |
          # Self-test needs reference .dat files. They aren't in the repo
          # (gitignored) so we skip when absent — this job just verifies
          # the code compiles and launches.
          ./RpfSealer.exe help | Select-Object -First 3

      - name: Upload built exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RpfSealer
          path: src/RpfSealer/bin/Release/RpfSealer.exe
          retention-days: 14
