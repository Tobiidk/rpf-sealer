name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build (Release)
        working-directory: src/RpfSealer
        run: dotnet build -c Release --nologo -v minimal

      - name: Compute SHA-256
        working-directory: src/RpfSealer/bin/Release
        shell: pwsh
        run: |
          $hash = (Get-FileHash RpfSealer.exe -Algorithm SHA256).Hash.ToLower()
          "$hash *RpfSealer.exe" | Out-File -Encoding ASCII RpfSealer.exe.sha256 -NoNewline
          Write-Host "SHA-256: $hash"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "RpfSealer ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            src/RpfSealer/bin/Release/RpfSealer.exe
            src/RpfSealer/bin/Release/RpfSealer.exe.sha256
